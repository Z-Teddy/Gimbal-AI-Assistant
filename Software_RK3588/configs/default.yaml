camera:
  index: 0
  width: 640
  height: 480
  flip: 0
  max_read_failures: 5
  reconnect_interval_sec: 2.0

serial:
  port: "/dev/ttyUSB0"
  baud_rate: 115200
  stm32_width: 319
  stm32_height: 239
  send_interval: 0.04
  reconnect_interval_sec: 2.0

runtime:
  mode: "gui"
  window_name: "RK3588 AI Tracker"
  display: ":0"

logging:
  level: "INFO"
  log_dir: "logs"
  file_name: "rk3588_tracker.log"
  format: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"
  date_format: "%Y-%m-%d %H:%M:%S"

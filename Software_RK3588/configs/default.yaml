camera:
  index: 0
  width: 640
  height: 480
  flip: 0
  max_read_failures: 5
  reconnect_interval_sec: 2.0

serial:
  port: "/dev/ttyUSB0"
  baud_rate: 115200
  stm32_width: 319
  stm32_height: 239
  send_interval: 0.04
  reconnect_interval_sec: 2.0

detector:
  type: "retinaface"
  haar_face: {}
  retinaface:
    model_path: "models/retinaface/RetinaFace_mobile320.rknn"
    input_size: 320
    candidate_threshold: 0.02
    score_threshold: 0.4
    nms_threshold: 0.4
    draw_landmarks: false
    bg_color: 114

protocol:
  heartbeat_enabled: false
  heartbeat_interval_sec: 1.0
  no_target_enabled: false
  no_target_interval_sec: 0.2
  mode_command_enabled: false
  mode_command_interval_sec: 0.5

control:
  default_mode: "track"
  target_lost_timeout_sec: 0.3
  lost_confirm_frames: 2
  reacquire_confirm_frames: 2
  no_target_mode: "hold"
  return_home_after_sec: 0.0
  home_x: 320
  home_y: 240
  scan_enabled: false
  scan_interval_sec: 1.0
  hold_before_scan_sec: 0.6
  scan_timeout_sec: 6.0
  return_home_hold_sec: 1.0
  scan_period_sec: 2.4
  scan_offset_px: 120

runtime:
  mode: "gui"
  window_name: "RK3588 AI Tracker"
  display: ":0"

voice:
  enabled: false
  device_keyword: "USB PnP Sound Device"
  cooldown_sec: 1.5
  debug: false
  max_speech_sec: 8.0
  vad_threshold: 0.35
  min_speech_sec: 0.3
  silence_sec: 0.6
  input_gain: 1.0
  override:
    track_sec: 2.5
    hold_sec: 10.0
    scan_sec: 5.0
    home_sec: 3.0
    log_blocked_transitions: true

logging:
  level: "INFO"
  log_dir: "logs"
  file_name: "rk3588_tracker.log"
  format: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"
  date_format: "%Y-%m-%d %H:%M:%S"
